<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>西卡游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 3rem 2rem;
            color: #2c241a;
            line-height: 1.4;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f5f0ec; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #e2cfbe; border-radius: 10px; }

        .container { max-width: 1280px; margin: 0 auto; }

        /* 液态玻璃卡片效果 */
        .glass-card {
            background: rgba(255, 255, 250, 0.48);
            backdrop-filter: blur(1.8px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -20px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(235,215,195,0.5), inset 0 1px 0 rgba(255,255,245,0.9);
            transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1.1);
        }
        .glass-card:hover {
            background: rgba(255,255,250,0.72);
            box-shadow: 0 30px 50px -22px rgba(0,0,0,0.12), 0 0 0 1px rgba(230,200,175,0.6);
            transform: translateY(-2px);
        }

        .site-header { text-align: center; margin-bottom: 3rem; }
        .site-title {
            font-size: 3.2rem;
            font-weight: 550;
            letter-spacing: -0.02em;
            background: linear-gradient(130deg, #c3926e, #b07a56, #dbaa82);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .site-desc { color: #a77b5c; font-size: 0.95rem; margin-top: 0.4rem; }

        /* 公告栏 */
        .notice-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 1.2rem;
            margin-bottom: 2rem;
            background: rgba(252,248,240,0.55);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            border: 0.5px solid rgba(220,195,170,0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            max-width: 90%;
        }
        .notice-icon {
            background: rgba(235,215,195,0.5);
            border-radius: 2rem;
            padding: 0.2rem 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ad7a56;
            white-space: nowrap;
        }
        /* 修改：替换 marquee 为 CSS 滚动 */
        .notice-text {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.85rem;
            color: #9f7456;
            font-weight: 450;
        }
        .marquee-wrap {
            display: inline-block;
            animation: marquee 40s linear infinite;
            white-space: nowrap;
        }
        .marquee-content {
            display: inline-block;
            padding-right: 2rem;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 加入QQ群按钮 */
        .qq-group-btn {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0 2rem;
        }
        .qq-btn {
            background: rgba(255, 255, 250, 0.6);
            backdrop-filter: blur(4px);
            border: 0.5px solid #e2cfbe;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 500;
            color: #b16840;
            text-decoration: none;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 0.5px;
        }
        .qq-btn:hover {
            background: #fef7ef;
            transform: scale(1.02);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.08);
            border-color: #d4bcab;
            color: #9f5f3b;
        }

        /* 双图框 */
        .image-row { display: flex; flex-wrap: wrap; gap: 2.2rem; margin-bottom: 3rem; }
        .img-card {
            flex: 1;
            background: rgba(255,252,246,0.5);
            backdrop-filter: blur(1.5px);
            border-radius: 2rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.35s ease;
            border: 0.5px solid rgba(220,195,175,0.4);
            box-shadow: 0 18px 30px -15px rgba(0,0,0,0.05);
        }
        .img-card:hover { transform: scale(0.97); background: rgba(255,252,246,0.7); }
        .img-card img { width: 100%; height: auto; display: block; }

        .section-title {
            font-size: 1.9rem;
            font-weight: 520;
            color: #b27b58;
            margin: 2.2rem 0 1.2rem;
            display: flex;
            align-items: baseline;
            gap: 0.7rem;
        }
        .section-title span {
            font-size: 0.85rem;
            background: #f1e4d9;
            padding: 0.15rem 1rem;
            border-radius: 2rem;
            color: #a6714e;
        }
        .server-list { display: flex; flex-direction: column; gap: 1.2rem; }
        .server-card {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            padding: 1.2rem 1.8rem;
            background: rgba(255,252,246,0.5);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            border: 0.5px solid #eeddcf;
        }
        .server-icon { width: 72px; height: 72px; border-radius: 1.2rem; background-size: cover; background-position: center; }
        .server-name { font-size: 1.5rem; font-weight: 530; color: #ad6d48; }
        .server-badge {
            background: #efded1;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            width: fit-content;
            font-size: 0.7rem;
            color: #9f6544;
        }
        .server-detail { display: flex; flex-wrap: wrap; gap: 0.6rem; font-size: 0.8rem; }
        .server-detail span { background: #f6ece3; padding: 0.2rem 1rem; border-radius: 2rem; color: #a27252; }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 1.8rem 0 2rem;
        }
        .blog-card {
            background: rgba(255,252,246,0.6);
            backdrop-filter: blur(2px);
            padding: 1.4rem;
            border-radius: 1.8rem;
            border: 0.5px solid #f0e2d6;
            transition: all 0.3s;
        }
        .blog-card:hover {
            background: rgba(255,252,246,0.85);
            transform: translateY(-4px);
            box-shadow: 0 22px 28px -14px rgba(0,0,0,0.08);
        }
        .blog-date { font-size: 0.72rem; color: #c69671; }
        .blog-title { font-size: 1.3rem; font-weight: 540; color: #b46a42; margin: 0.3rem 0; }
        .blog-excerpt { color: #8b6e58; font-size: 0.85rem; margin-bottom: 1rem; }
        .readmore { color: #e39866; text-decoration: none; border-bottom: 1px solid #ecdaca; }
        .footer-note { text-align: center; font-size: 0.7rem; color: #cfa67f; margin-top: 2.5rem; border-top: 0.5px solid #eee1d5; padding-top: 1.5rem; }

        @media (max-width: 760px) {
            body { padding: 1.5rem; }
            .site-title { font-size: 2.4rem; }
            .server-card { flex-direction: column; text-align: center; }
            .server-icon { margin: 0 auto; }
            .notice-text { white-space: normal; }
            .marquee-wrap { white-space: nowrap; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="site-header">
        <div class="site-title">西卡游戏</div>
        <div class="site-desc">欢迎</div>
    </div>

    <!-- 滚动公告栏（已改为CSS动画） -->
    <div class="notice-bar" id="noticeBar">
        <div class="notice-icon">✨ 即时公告</div>
        <div class="notice-text" id="noticeText">
            <div class="marquee-wrap">
                <div class="marquee-content">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 加入QQ群按钮 -->
    <div class="qq-group-btn">
        <a href="https://qun.qq.com/universal-share/share?ac=1&authKey=2kkzYjTgE9JGej83s1o9wLXbd24f7b8XeCoHdAs5ATNCdyjv6WSAbQJnTbuGZOc%2F&busi_data=eyJncm91cENvZGUiOiIxMDc1OTMyODQ0IiwidG9rZW4iOiJVOGlSVDBzVkhDZkVGV2lhbXNYUmw0Uk1Rd1BHQWdSNjRyVjdoK1MzSzIxZ3FBSy83Y3hnTFgrWGx2d3ZJYTByIiwidWluIjoiOTQyNDAzNDU2In0%3D&data=-oW4oOB1A-_eaDR7oK7nfM-12kVuaV8BapovFKg5174lb3OxVfdXp4ZSRV5Ze9C73wK_-iWwkMXsAvCvWa0-ww&svctype=4&tempid=h5_group_info" target="_blank" rel="noopener noreferrer" class="qq-btn">
            💬 加入QQ群 · 一起玩耍
        </a>
    </div>

    <!-- 双随机图框 -->
    <div class="image-row">
        <div class="img-card" id="imgCard1">
            <img id="randomImg1" alt="琉璃一瞥" src="https://picsum.photos/600/400?random=101">
        </div>
        <div class="img-card" id="imgCard2">
            <img id="randomImg2" alt="轻漫随想" src="https://picsum.photos/600/400?random=202">
        </div>
    </div>

    <!-- 服务器展示 -->
    <div class="section-title">🎐 服务器 <span>在线</span></div>
    <div class="server-list">
        <div class="server-card">
            <div class="server-icon" style="background-image: url('https://s41.ax1x.com/2026/03/08/pePzRVe.png');"></div>
            <div class="server-info">
                <div class="server-name">网易版我的世界</div>
                <div class="server-badge">基岩移动</div>
                <div class="server-detail">
                    <span>⚓ 1604295</span>
                    <span>👥 20位</span>
                    <span>❄️ 雪球菜单</span>
                    <span>🕊️ 死亡传送</span>
                </div>
            </div>
        </div>
        <div class="server-card">
            <div class="server-icon" style="background-image: url('https://s41.ax1x.com/2026/03/08/pePzWUH.jpg');"></div>
            <div class="server-info">
                <div class="server-name">xikabak-services</div>
                <div class="server-badge">憩息 · 小游戏</div>
                <div class="server-detail">
                    <span>✨ 酿造中</span>
                    <span>暂未开放</span>
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; padding: 0.3rem 0.8rem; background: #faf3ec; border-radius: 2rem; width: fit-content;">
            <span>🍃</span><span style="color:#997e66;">更多风景 静候登场</span>
        </div>
    </div>

    <!-- 博客动态区 -->
    <div class="section-title">📖 垃圾桶 <span> </span></div>
    <div id="blog-list" class="blog-grid">
        <div style="grid-column:1/-1; text-align:center; color:#bb8767;">正在捡垃圾...</div>
    </div>

    <div class="footer-note">本网站不对中国大陆用户开放 如有访问 请即刻退出</div>
</div>

<script>
    // 1. 随机图片刷新
    const img1 = document.getElementById('randomImg1');
    const img2 = document.getElementById('randomImg2');
    const card1 = document.getElementById('imgCard1');
    const card2 = document.getElementById('imgCard2');
    function refreshImg(target) { target.src = `https://picsum.photos/700/450?random=${Math.random()}`; }
    card1.addEventListener('click', () => refreshImg(img1));
    card2.addEventListener('click', () => refreshImg(img2));
    refreshImg(img1); refreshImg(img2);

    // 2. 动态加载公告（从 notice.json 读取最新一条）- 已适配 CSS 滚动结构
async function loadNotice() {
    try {
        const res = await fetch('notice.json?v=' + Date.now());
        if (!res.ok) throw new Error();
        const data = await res.json();
        let latestMsg = data.latest || "✨ 服务器温暖在线，欢迎游玩 ✨";
        const contentElem = document.querySelector('#noticeText .marquee-content');
        if (contentElem) {
            contentElem.innerText = latestMsg;
            // 计算文本长度（以字符数为准）
            const textLength = latestMsg.length;
            let duration = 20; // 默认20秒
            if (textLength <= 20) duration = 15;
            else if (textLength <= 40) duration = 20;
            else if (textLength <= 80) duration = 30;
            else duration = 40;
            // 获取 .marquee-wrap 元素并设置动画时长
            const wrap = document.querySelector('#noticeText .marquee-wrap');
            if (wrap) {
                wrap.style.animationDuration = duration + 's';
            }
        }
    } catch(e) {
        const contentElem = document.querySelector('#noticeText .marquee-content');
        if (contentElem) {
            contentElem.innerText = "✨ 服务器温暖在线，欢迎游玩 ✨";
            const wrap = document.querySelector('#noticeText .marquee-wrap');
            if (wrap) wrap.style.animationDuration = '20s'; // 出错时恢复默认
        }
    }
}

    // 3. 博客动态加载（保留原有功能）
    const blogContainer = document.getElementById('blog-list');
    fetch('posts/index.json')
        .then(res => { if (!res.ok) throw new Error(); return res.json(); })
        .then(posts => {
            blogContainer.innerHTML = '';
            if (!posts.length) { blogContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#bd8b6a;">暂无帖子，静候灵感</div>'; return; }
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <div class="blog-date">📅 ${post.date}</div>
                    <div class="blog-title">${post.title}</div>
                    <div class="blog-excerpt">${post.excerpt}</div>
                    <a href="posts/${post.file}" class="readmore">细雨慢读 →</a>
                `;
                blogContainer.appendChild(card);
            });
        })
        .catch(() => { blogContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#b37f5e;">渊面微澜，稍后再访</div>'; });
</script>
</body>
</html>
